name: Deploy Tattoo Shop Backend

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'index.js'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile.prod'
      - 'docker-compose.prod.yml'
      - '.dockerignore'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          ENV_PROD: ${{ secrets.ENV_PROD }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: ENV_PROD
          script: |
            cd /home/deploy/tattoo-shop-back
            git pull origin main
            printf '%s' "$ENV_PROD" > .env.prod
            docker compose -f docker-compose.prod.yml up -d --build backend-tattoo
